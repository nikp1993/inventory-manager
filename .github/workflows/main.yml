name: CI/CD Pipeline for Inventory Manager - Build, Test, and Publish Docker Images

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  provision-infra:
    uses: ./.github/workflows/provision-infra.yml

  build-images:
    uses: ./.github/workflows/build-images.yml
    
  test-backend:
    needs: build-images
    uses: ./.github/workflows/test-backend.yml

  test-frontend:
    needs: build-images
    uses: ./.github/workflows/test-frontend.yml

  publish-images:
    needs: 
      - test-backend
      - test-frontend
    uses: ./.github/workflows/publish-images.yml