name: Check Diff
description: Action to detect changes in a specified directory

inputs:
  directory:
    description: 'Directory to check for changes'
    required: true
    type: string

runs:
  using: 'composite'
  steps:
    - name: Determine diff range
      id: range
      shell: bash
      run: |
        if [[ "${{ github.event_name }}" == "pull_request" ]]; then
          echo "base=${{ github.event.pull_request.base.sha }}" >> $GITHUB_OUTPUT
          echo "head=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
          echo "mode=diff" >> $GITHUB_OUTPUT
  
        elif [[ "${{ github.event_name }}" == "push" ]]; then
          echo "base=${{ github.event.before }}" >> $GITHUB_OUTPUT
          echo "head=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "mode=diff" >> $GITHUB_OUTPUT

        else
          echo "mode=always" >> $GITHUB_OUTPUT
        fi

    - name: Check for changes in the specified directory
      id: check_diff
      shell: bash
      run: |
        MODE="${{ steps.range.outputs.mode }}"

        if [[ "$MODE" == "always" ]]; then
          echo "diff_detected=true" >> $GITHUB_OUTPUT
          exit 0
        fi

        BASE="${{ steps.range.outputs.base }}"
        HEAD="${{ steps.range.outputs.head }}"

        if git diff --name-only "$BASE" "$HEAD" ${{ inputs.directory }} | grep .; then
          echo "diff_detected=true" >> $GITHUB_OUTPUT
        else
          echo "diff_detected=false" >> $GITHUB_OUTPUT
        fi