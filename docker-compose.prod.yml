services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app_network
    depends_on:
      - frontend
      - backend

  backend:
    image: ghcr.io/${GHCR_OWNER}/inventory-manager-backend:${IMAGE_TAG}
    container_name: backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: app_db
      JWT_SECRET: ${JWT_SECRET_KEY}
    networks:
      - app_network
    depends_on:
      - postgres

  frontend:
    image: ghcr.io/${GHCR_OWNER}/inventory-manager-frontend:${IMAGE_TAG}
    container_name: frontend
    networks:
      - app_network
    depends_on:
      - backend

  postgres:
    image: postgres:18-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: app_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
    networks:
      - app_network

volumes:
  pgdata:

networks:
  app_network: